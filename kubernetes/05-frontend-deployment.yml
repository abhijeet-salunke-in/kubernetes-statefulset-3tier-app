apiVersion: apps/v1
kind: Deployment

metadata:
  name: frontend-app

spec:
  replicas: 1

  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend

    spec:
      containers:
      - name: frontend

        image: abhisalunke16/sts-front-img:v1

        ports:
        - containerPort: 80
